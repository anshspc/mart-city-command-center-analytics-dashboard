services:
  - type: web
    name: indore-smart-city-command-center
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PYTHONUNBUFFERED
        value: "true"
